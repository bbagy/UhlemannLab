<body>
<main>
  <p><a href="./">← Back to Portal</a></p>
  <h1>RNake</h1>
  <p>Bacterial RNA-seq pipeline for trimming, mapping, and count tables.</p>
  <h2>Build</h2>
  <pre><code>cd RNake
docker build -t rnake:latest .</code></pre>
  <h2>Run</h2>
  <pre><code>./RNake/Go_Rnake.sh \
  -i /path/to/reads \
  -o project_name \
  -g /path/to/genome.fna \
  -a /path/to/annotation.gff \
  -K</code></pre>
</main>
