<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PFsnake Usage</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background: #f7f8f6; color: #18232e; }
    main { max-width: 900px; margin: 0 auto; padding: 28px 18px 40px; }
    a { color: #165f8e; text-decoration: none; } a:hover { text-decoration: underline; }
    pre { background: #fff; border: 1px solid #d9dfd3; border-radius: 10px; padding: 12px; overflow-x: auto; }
    code { font-family: ui-monospace, Menlo, Consolas, monospace; }
  </style>
</head>
<body>
<main>
  <p><a href="./">← Back to Portal</a></p>
  <h1>PFsnake</h1>
  <p><em>P. falciparum</em> Illumina workflow for variants/CNV/drug summaries.</p>
  <h2>Build</h2>
  <pre><code>cd PFsnake
docker build -t pf-snake:1.0 .</code></pre>
  <h2>Run</h2>
  <pre><code>./PFsnake/Go_PFsnake.sh \
  -i /path/to/fastq \
  -o /path/to/output \
  -d /path/to/ref.fasta \
  -p 2 -K</code></pre>
</main>
</body>
</html>
